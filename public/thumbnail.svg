<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f1" opacity="0.1"/>
  <circle cx="1200" cy="500" r="250" fill="#d946ef" opacity="0.1"/>
  <circle cx="1100" cy="100" r="150" fill="#8b5cf6" opacity="0.08"/>
  
  <!-- Logo (left side) -->
  <g transform="translate(150, 120)">
    <circle cx="200" cy="200" r="180" fill="url(#logoGrad)"/>
    <ellipse cx="140" cy="200" rx="60" ry="75" fill="none" stroke="white" stroke-width="24"/>
    <ellipse cx="260" cy="200" rx="60" ry="75" fill="none" stroke="white" stroke-width="24"/>
    <path d="M200 260 C200 260 160 225 160 195 C160 175 175 160 200 160 C225 160 240 175 240 195 C240 225 200 260 200 260 Z" fill="white" opacity="0.9"/>
    <circle cx="200" cy="45" r="12" fill="white"/>
    <line x1="200" y1="22" x2="200" y2="0" stroke="white" stroke-width="5"/>
    <line x1="180" y1="38" x2="165" y2="22" stroke="white" stroke-width="5"/>
    <line x1="220" y1="38" x2="235" y2="22" stroke="white" stroke-width="5"/>
  </g>
  
  <!-- Text (right side) -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#textGrad)">SoulChain</text>
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="36" fill="#a1a1aa">Your Memories. Forever.</text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="24" fill="#71717a">AI-Powered Digital Legacy Platform</text>
  
  <!-- Feature badges -->
  <g transform="translate(600, 420)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#6366f1" opacity="0.3"/>
    <text x="70" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">0G Storage</text>
    
    <rect x="160" y="0" width="160" height="40" rx="20" fill="#8b5cf6" opacity="0.3"/>
    <text x="240" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">AES-256 Encryption</text>
    
    <rect x="340" y="0" width="120" height="40" rx="20" fill="#d946ef" opacity="0.3"/>
    <text x="400" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Nova AI</text>
  </g>
  
  <!-- Hackathon badge -->
  <rect x="600" y="520" width="200" height="35" rx="5" fill="#22c55e"/>
  <text x="700" y="545" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">0G Arena 2026</text>
</svg>
